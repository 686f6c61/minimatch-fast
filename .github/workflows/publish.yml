name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

# Minimum permissions needed. id-token: write is required for
# npm trusted publishing (OIDC) and provenance.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing (OIDC) requires npm CLI >= 11.5.1;
      # the npm bundled with Node 20 is older
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        # No token needed: npm trusted publishing authenticates via OIDC.
        # Provenance is generated automatically with trusted publishing.
        run: npm publish --access public --provenance
